# ══════════════════════════════════════════════════════════════
#  SonarQube Configuration — Omnium
#  Server: http://bane.tamucc.edu:9000
# ══════════════════════════════════════════════════════════════

sonar.projectKey=quantumshell
sonar.projectName=Omnium
sonar.projectVersion=0.1.0

# ── Source Paths ──
sonar.sources=src/omnium
sonar.tests=tests
sonar.python.version=3

# ── Coverage (generated by pytest-cov) ──
sonar.python.coverage.reportPaths=coverage.xml

# ── Test Report (generated by pytest --junitxml) ──
sonar.python.xunit.reportPath=test-results.xml

# ── Exclusions ──
# Don't analyze devtools, generated files, or test fixtures
sonar.exclusions=devtools/**,lib/**,**/__pycache__/**,*.pyc

# ── Encoding ──
sonar.sourceEncoding=UTF-8
